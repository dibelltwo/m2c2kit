<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>M2C2 EMA — Dev Preview</title>
    <link href="assets/css/defaultV2.css" rel="stylesheet" />
    <link href="assets/css/nouislider.css" rel="stylesheet" />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: system-ui, sans-serif;
        background: #1a1a2e;
        color: #eee;
      }

      /* Fixed top controls bar */
      #controls {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        z-index: 1000;
        background: rgba(0, 0, 0, 0.88);
        padding: 8px 16px;
        display: flex;
        align-items: center;
        gap: 10px;
        flex-wrap: wrap;
        border-bottom: 1px solid #333;
      }
      #controls h2 {
        font-size: 13px;
        color: #aaa;
        white-space: nowrap;
      }
      select,
      button {
        font-size: 13px;
        padding: 5px 12px;
        border-radius: 6px;
        border: none;
        cursor: pointer;
      }
      select {
        background: #333;
        color: #eee;
      }
      select:disabled {
        opacity: 0.4;
        cursor: not-allowed;
      }
      button.primary {
        background: #4f8ef7;
        color: #fff;
        font-weight: 600;
      }
      button.primary:hover {
        background: #3a7ae6;
      }
      button.secondary {
        background: #555;
        color: #eee;
      }
      button.secondary:hover {
        background: #666;
      }
      button.accent {
        background: #f39c12;
        color: #161616;
        font-weight: 700;
      }
      button.accent:hover {
        background: #db8c0a;
      }
      button.danger {
        background: #c0392b;
        color: #fff;
        font-weight: 600;
      }
      button.danger:hover {
        background: #a93226;
      }
      button:disabled {
        opacity: 0.35;
        cursor: not-allowed;
      }
      #status {
        font-size: 12px;
        color: #aaa;
        margin-left: auto;
      }
      #status span {
        color: #7ef7a0;
        font-weight: 600;
      }

      /*
       * Canvas viewport — centers the game canvas without stretching it.
       * DO NOT force width/height on #app or its canvas children.
       * m2c2kit uses offsetX/offsetY for hit-testing; CSS stretching breaks
       * click coordinates (offsetX would be in CSS-pixel space but the game
       * checks hits in canvas-pixel space).
       */
      #app-viewport {
        position: fixed;
        top: 48px;
        left: 0;
        right: 0;
        bottom: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #111;
      }
      #app {
        position: relative;
      }
      #app.survey-mode {
        width: 100%;
        height: 100%;
        overflow-y: auto;
        background: #fff;
      }
      #app.setup-mode {
        width: 100%;
        height: 100%;
        overflow-y: auto;
        padding: 18px;
        background: #f4f0e8;
      }
      #app.standby-mode {
        width: 100%;
        height: 100%;
        overflow-y: auto;
        padding: 32px 18px;
        background: radial-gradient(circle at top, #1f2f24 0, #111 55%);
        color: #f0f5ef;
      }
      .standby-shell {
        max-width: 760px;
        margin: 0 auto;
        padding: 28px;
        border-radius: 20px;
        background: rgba(12, 19, 14, 0.86);
        border: 1px solid rgba(255, 255, 255, 0.08);
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
      }
      .standby-shell h2 {
        margin-bottom: 8px;
      }
      .standby-shell p {
        line-height: 1.5;
        color: #d8e5dc;
      }
      .setup-shell {
        max-width: 1100px;
        margin: 0 auto;
        color: #1f2a1f;
      }
      .setup-hero {
        margin-bottom: 18px;
      }
      .setup-grid {
        display: grid;
        grid-template-columns: 1.15fr 0.85fr;
        gap: 18px;
      }
      .setup-panel {
        background: #fffaf0;
        border: 1px solid #d8cfbf;
        border-radius: 18px;
        padding: 18px;
        box-shadow: 0 12px 36px rgba(31, 42, 31, 0.06);
      }
      .setup-section,
      .setup-card {
        display: grid;
        gap: 10px;
      }
      .setup-section + .setup-section {
        margin-top: 18px;
      }
      .setup-subsection {
        display: grid;
        gap: 10px;
      }
      .setup-subsection-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        flex-wrap: wrap;
      }
      .setup-field {
        display: grid;
        gap: 6px;
      }
      .setup-field span,
      .setup-panel h3,
      .setup-panel h4 {
        color: #1f2a1f;
      }
      .setup-field input,
      .setup-field textarea,
      .setup-field select {
        width: 100%;
        padding: 10px 12px;
        border-radius: 10px;
        border: 1px solid #d8cfbf;
        background: #fff;
        color: #1f2a1f;
      }
      .setup-field select {
        appearance: auto;
      }
      .setup-field textarea {
        min-height: 96px;
        resize: vertical;
      }
      .setup-card input[type="checkbox"] {
        width: auto;
        accent-color: #1f6f52;
      }
      .setup-stack {
        display: grid;
        gap: 10px;
      }
      .setup-row,
      .setup-actions,
      .setup-pill-row {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
      }
      .setup-pill {
        display: inline-flex;
        align-items: center;
        border-radius: 999px;
        border: 1px solid #d8cfbf;
        background: #fff;
        padding: 8px 12px;
        color: #1f2a1f;
      }
      .setup-warning {
        color: #9c4a22;
        min-height: 18px;
      }
      .setup-preview pre,
      #setup-preview {
        overflow: auto;
        margin: 0;
        padding: 14px;
        border-radius: 12px;
        background: #17211b;
        color: #eaf4ed;
        font-size: 12px;
        line-height: 1.5;
      }
      @media (max-width: 900px) {
        .setup-grid {
          grid-template-columns: 1fr;
        }
      }
      #app.survey-mode .ema-skip-control {
        display: flex;
        justify-content: flex-end;
        margin-bottom: 8px;
      }
      #app.survey-mode .ema-skip-control legend,
      #app.survey-mode .ema-skip-control .sv-string-viewer,
      #app.survey-mode .ema-skip-control .sd-question__title,
      #app.survey-mode .ema-skip-control .sv_q_title {
        display: none !important;
      }
      #app.survey-mode .ema-skip-control .sd-item:first-child,
      #app.survey-mode .ema-skip-control .sv-item:first-child,
      #app.survey-mode .ema-skip-control label:first-of-type,
      #app.survey-mode .ema-skip-control li:first-child {
        display: none !important;
      }
      #app.survey-mode .ema-skip-control .sd-item,
      #app.survey-mode .ema-skip-control .sv-item,
      #app.survey-mode .ema-skip-control label,
      #app.survey-mode .ema-skip-control li {
        margin: 0;
      }
      #app.survey-mode .ema-skip-control .sd-item__control-label,
      #app.survey-mode .ema-skip-control .sv-item__control-label,
      #app.survey-mode .ema-skip-control label,
      #app.survey-mode .ema-skip-control .sd-selectbase__label {
        display: inline-flex;
        align-items: center;
        border-radius: 999px;
        background: #fff3e0;
        border: 1px solid #f0c38a;
        color: #9c4a22;
        padding: 6px 12px;
        font-weight: 600;
      }
    </style>
  </head>
  <body>
    <div id="controls">
      <h2>EMA Dev</h2>
      <button class="accent" id="btn-start-prompt">Run Prompt</button>
      <select id="assessment-picker">
        <option value="color-dots">Color Dots</option>
        <option value="color-shapes">Color Shapes</option>
        <option value="grid-memory">Grid Memory</option>
        <option value="symbol-search">Symbol Search</option>
        <option value="ema-survey">EMA Survey</option>
      </select>
      <button class="primary" id="btn-start">▶ Start</button>
      <button class="secondary" id="btn-setup">Setup</button>
      <button class="secondary" id="btn-instructions">+ Instructions</button>
      <button class="danger" id="btn-stop" disabled>■ Stop</button>
      <div id="status">Status: <span id="status-text">idle</span></div>
    </div>

    <div id="app-viewport">
      <div id="app"></div>
    </div>

    <script type="module" src="index.js"></script>
  </body>
</html>
