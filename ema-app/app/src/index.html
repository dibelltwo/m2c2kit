<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>M2C2 EMA — Dev Preview</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: system-ui, sans-serif;
        background: #1a1a2e;
        color: #eee;
      }

      /* Fixed top controls bar */
      #controls {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        z-index: 1000;
        background: rgba(0, 0, 0, 0.88);
        padding: 8px 16px;
        display: flex;
        align-items: center;
        gap: 10px;
        flex-wrap: wrap;
        border-bottom: 1px solid #333;
      }
      #controls h2 {
        font-size: 13px;
        color: #aaa;
        white-space: nowrap;
      }
      select,
      button {
        font-size: 13px;
        padding: 5px 12px;
        border-radius: 6px;
        border: none;
        cursor: pointer;
      }
      select {
        background: #333;
        color: #eee;
      }
      select:disabled {
        opacity: 0.4;
        cursor: not-allowed;
      }
      button.primary {
        background: #4f8ef7;
        color: #fff;
        font-weight: 600;
      }
      button.primary:hover {
        background: #3a7ae6;
      }
      button.secondary {
        background: #555;
        color: #eee;
      }
      button.secondary:hover {
        background: #666;
      }
      button.danger {
        background: #c0392b;
        color: #fff;
        font-weight: 600;
      }
      button.danger:hover {
        background: #a93226;
      }
      button:disabled {
        opacity: 0.35;
        cursor: not-allowed;
      }
      #status {
        font-size: 12px;
        color: #aaa;
        margin-left: auto;
      }
      #status span {
        color: #7ef7a0;
        font-weight: 600;
      }

      /*
       * Canvas viewport — centers the game canvas without stretching it.
       * DO NOT force width/height on #app or its canvas children.
       * m2c2kit uses offsetX/offsetY for hit-testing; CSS stretching breaks
       * click coordinates (offsetX would be in CSS-pixel space but the game
       * checks hits in canvas-pixel space).
       */
      #app-viewport {
        position: fixed;
        top: 48px;
        left: 0;
        right: 0;
        bottom: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #111;
      }
      #app {
        position: relative;
      }
    </style>
  </head>
  <body>
    <div id="controls">
      <h2>EMA Dev</h2>
      <select id="assessment-picker">
        <option value="color-dots">Color Dots</option>
        <option value="color-shapes">Color Shapes</option>
        <option value="grid-memory">Grid Memory</option>
        <option value="symbol-search">Symbol Search</option>
      </select>
      <button class="primary" id="btn-start">▶ Start</button>
      <button class="secondary" id="btn-instructions">+ Instructions</button>
      <button class="danger" id="btn-stop" disabled>■ Stop</button>
      <div id="status">Status: <span id="status-text">idle</span></div>
    </div>

    <div id="app-viewport">
      <div id="app"></div>
    </div>

    <script type="module" src="index.js"></script>
  </body>
</html>
