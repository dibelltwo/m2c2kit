services:
  db:
    image: postgres:16
    container_name: ema-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ema
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - ema_pgdata:/var/lib/postgresql/data

volumes:
  ema_pgdata:
